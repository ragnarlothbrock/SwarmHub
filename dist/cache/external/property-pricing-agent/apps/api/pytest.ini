[pytest]
# Pytest configuration for AI Real Estate Assistant
asyncio_mode = auto

# Ensure project root is on sys.path so local packages (mcp/, data/) take
# precedence over installed PyPI packages with the same names.
pythonpath = .

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra
    -n auto
    --dist=loadgroup
    --max-worker-restart=3
    --ignore=tests/unit/test_dev_start_script.py
    --ignore=tests/unit/scripts/test_start_docker_mode.py
    --ignore=tests/unit/test_update_api_reference_full.py
    --ignore=tests/integration/test_port_allocation.py
    --ignore=tests/integration/test_versioning.py
    --ignore=tests/integration/test_dev_start_script_integration.py
    --ignore=tests/integration/test_market_api.py

# Dev workflow: add -x --ff to stop on first fail and rerun failed tests first
# pytest -x --ff tests/unit/test_query_analyzer.py

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    slow: Slow-running tests
    requires_api: Tests requiring API keys

# Coverage options (if pytest-cov is installed)
# Uncomment to enable coverage
# addopts = --cov=. --cov-report=html --cov-report=term

# Ignore paths
norecursedirs = .git .tox dist build *.egg chroma_db

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (requires pytest-timeout)
# timeout = 300
