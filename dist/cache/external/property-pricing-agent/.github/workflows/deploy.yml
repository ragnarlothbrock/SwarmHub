name: Deploy Pipeline

on:
  # Auto-deploy: wait for CI/CD suite to complete successfully first.
  # workflow_run only fires when the referenced workflow completes, so
  # deploys no longer race against CI. The conclusion is checked below
  # in the ci-check job (for workflow_dispatch) but for workflow_run
  # events CI has provably already finished.
  workflow_run:
    workflows: ["CI/CD AI Real Estate Assistant"]
    types: [completed]
    branches: [main, dev]

  # Manual deploy: trigger from GitHub Actions UI. Skips the workflow_run
  # gate; the ci-check job still verifies CI state before deploying.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - production
          - staging

# Prevent overlapping deploys to the same ref. cancel-in-progress: false
# ensures an in-flight deploy is never killed mid-flight by a new push.
concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  RENDER_SERVICE_ID_API: ${{ secrets.RENDER_SERVICE_ID_API }}
  RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}

jobs:
  ci-check:
    runs-on: ubuntu-latest
    # Only required for workflow_dispatch (manual) deploys.
    # workflow_run events guarantee CI already completed (and succeeded,
    # since the deploy would not be triggered by the failed-run path
    # under GitHub's default branch protection semantics — though we
    # still verify the conclusion below as defense in depth).
    if: github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - uses: actions/checkout@v6

      - name: Verify CI passed on target branch
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const isStaging = branch === 'dev';

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: branch,
              status: 'completed',
              per_page: 1
            });

            if (!runs.data.workflow_runs.length) {
              if (isStaging) {
                core.warning('No CI runs found for ' + branch + '. Proceeding for staging deployment.');
              } else {
                core.setFailed('No CI runs found for ' + branch + '. Deploy blocked.');
              }
              return;
            }

            const run = runs.data.workflow_runs[0];
            if (run.conclusion === 'success') {
              core.info('CI passed on ' + branch + '. Proceeding with deployment.');
              return;
            }

            // For staging: allow deployment if only non-critical jobs failed
            if (isStaging) {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100
              });

              const criticalPatterns = ['backend-tests', 'frontend-build', 'gitleaks'];
              const failedCritical = jobs.data.jobs.filter(
                j => j.conclusion === 'failure' && criticalPatterns.some(p => j.name.includes(p))
              );

              if (failedCritical.length === 0) {
                core.warning('CI had non-critical failures on ' + branch + '. Proceeding for staging deployment.');
              } else {
                const failedNames = failedCritical.map(j => j.name).join(', ');
                core.setFailed('Critical CI jobs failed on ' + branch + ': ' + failedNames + '. Deploy blocked.');
              }
            } else {
              core.setFailed('Last CI run on ' + branch + ' did not succeed. Deploy blocked.');
            }

  validate:
    needs: [ci-check]
    if: |
      always() &&
      needs.ci-check.result != 'failure' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment configs
        run: |
          echo "Validating deployment configurations..."
          # Check required files exist (Dockerfiles always needed)
          for f in deploy/docker/Dockerfile.backend deploy/docker/Dockerfile.frontend deploy/compose/docker-compose.yml; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing $f"
              exit 1
            fi
            echo "  ✓ $f"
          done

          # Check render.yaml on main/dev
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            if [ ! -f "render.yaml" ]; then
              echo "WARNING: Missing render.yaml (needed for Render deploy)"
            fi
            if [ -f render.yaml ] && grep -q "REPLACE_WITH" render.yaml; then
              echo "ERROR: render.yaml contains placeholder values"
              exit 1
            fi
            echo "  ✓ Deploy configs validated"
          fi

          # Check Dockerfiles parse correctly (dry-run without full build)
          docker build --check -f deploy/docker/Dockerfile.backend . 2>/dev/null || \
            docker build -f deploy/docker/Dockerfile.backend . --check 2>/dev/null || \
            echo "  ⚠ Docker build check skipped (Docker daemon may not support --check)"
          echo "  ✓ Backend Dockerfile syntax OK"

  deploy-backend:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/dev' && 'staging') || 'production' }}
    steps:
      - name: Select Render service
        id: service
        run: |
          DEPLOY_ENV="${{ github.event.inputs.environment || (github.ref == 'refs/heads/dev' && 'staging') || 'production' }}"
          echo "Deploy environment: $DEPLOY_ENV"
          if [ "$DEPLOY_ENV" = "staging" ]; then
            echo "id=${{ secrets.RENDER_SERVICE_ID_API_STAGING }}" >> $GITHUB_OUTPUT
            echo "url=${{ secrets.RENDER_BACKEND_URL_STAGING }}" >> $GITHUB_OUTPUT
          else
            echo "id=${{ secrets.RENDER_SERVICE_ID_API }}" >> $GITHUB_OUTPUT
            echo "url=${{ secrets.RENDER_BACKEND_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Get previous deploy ID (for rollback)
        id: prev-deploy
        run: |
          PREV=$(curl -s "https://api.render.com/v1/services/${{ steps.service.outputs.id }}/deploys?limit=1" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.[0].id // empty')
          echo "id=$PREV" >> $GITHUB_OUTPUT

      - name: Trigger Render backend deploy
        if: steps.service.outputs.id != ''
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ steps.service.outputs.id }}/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -d '{"clearCache": "clear"}' | jq .

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            # -m 10 = 10s curl timeout so a hung Render cold-start
            # doesn't block the loop forever. -f = silent on HTTP
            # errors. Without -m, the previous loop hung for 75+ min
            # against a Render free-tier service that wasn't returning
            # /health, blocking the deploy pipeline.
            if curl -m 10 -sf "${{ steps.service.outputs.url }}/health" | jq -e '.status == "healthy"' >/dev/null 2>&1; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "  Attempt $i/30 - waiting 30s..."
            sleep 30
          done
          echo "ERROR: Backend health check failed after 15 minutes"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.prev-deploy.outputs.id != ''
        run: |
          echo "Rolling back to previous deploy: ${{ steps.prev-deploy.outputs.id }}"
          curl -s -X POST "https://api.render.com/v1/services/${{ steps.service.outputs.id }}/deploys/${{ steps.prev-deploy.outputs.id }}/rollback" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq .
          echo "Rollback initiated."

  deploy-frontend:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/dev' && 'staging') || 'production' }}
    outputs:
      deploy-url: ${{ steps.resolve-url.outputs.url }}
    steps:
      - name: Select Render frontend service
        id: service
        run: |
          DEPLOY_ENV="${{ github.event.inputs.environment || (github.ref == 'refs/heads/dev' && 'staging') || 'production' }}"
          echo "Deploy environment: $DEPLOY_ENV"
          if [ "$DEPLOY_ENV" = "staging" ]; then
            echo "id=${{ secrets.RENDER_SERVICE_ID_WEB_STAGING }}" >> $GITHUB_OUTPUT
          else
            echo "id=${{ secrets.RENDER_SERVICE_ID_WEB }}" >> $GITHUB_OUTPUT
          fi

      - name: Resolve frontend URL
        id: resolve-url
        run: |
          DEPLOY_ENV="${{ github.event.inputs.environment || (github.ref == 'refs/heads/dev' && 'staging') || 'production' }}"
          if [ "$DEPLOY_ENV" = "staging" ]; then
            URL="${{ secrets.RENDER_FRONTEND_URL_STAGING }}"
          else
            URL="${{ secrets.RENDER_FRONTEND_URL }}"
          fi
          # Write URL to a temp file to avoid secret masking, then set output
          echo "$URL" > /tmp/frontend_url.txt
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Get previous deploy ID (for rollback)
        id: prev-deploy
        run: |
          PREV=$(curl -s "https://api.render.com/v1/services/${{ steps.service.outputs.id }}/deploys?limit=1" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.[0].id // empty')
          echo "id=$PREV" >> $GITHUB_OUTPUT

      - name: Trigger Render frontend deploy
        if: steps.service.outputs.id != ''
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ steps.service.outputs.id }}/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -d '{"clearCache": "clear"}' | jq .

      - name: Wait for frontend health
        run: |
          FRONTEND_URL=$(cat /tmp/frontend_url.txt)
          echo "Waiting for frontend to become healthy at $FRONTEND_URL..."
          for i in $(seq 1 30); do
            # -m 10 = 10s curl timeout (see Wait for backend health above)
            if curl -m 10 -sf "$FRONTEND_URL" -o /dev/null; then
              echo "Frontend is live!"
              exit 0
            fi
            echo "  Attempt $i/30 - waiting 30s..."
            sleep 30
          done
          echo "ERROR: Frontend health check failed after 15 minutes"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.prev-deploy.outputs.id != ''
        run: |
          echo "Rolling back to previous deploy: ${{ steps.prev-deploy.outputs.id }}"
          curl -s -X POST "https://api.render.com/v1/services/${{ steps.service.outputs.id }}/deploys/${{ steps.prev-deploy.outputs.id }}/rollback" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq .
          echo "Rollback initiated."

  smoke-test:
    needs: [deploy-backend, deploy-frontend]
    if: always() && needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run smoke tests
        run: |
          echo "Running post-deployment smoke tests..."

          # Determine environment URLs
          DEPLOY_ENV="${{ github.event.inputs.environment || (github.ref == 'refs/heads/dev' && 'staging') || 'production' }}"
          if [ "$DEPLOY_ENV" = "staging" ]; then
            BACKEND_URL="${{ secrets.RENDER_BACKEND_URL_STAGING }}"
            FRONTEND_URL="${{ secrets.RENDER_FRONTEND_URL_STAGING }}"
          else
            BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
            FRONTEND_URL="${{ secrets.RENDER_FRONTEND_URL }}"
          fi

          echo "Environment: $DEPLOY_ENV"
          echo "Backend: $BACKEND_URL"

          # Backend health
          health=$(curl -m 10 -sf "${BACKEND_URL}/health" | jq -r '.status')
          if [ "$health" != "healthy" ]; then
            echo "ERROR: Backend status=$health"
            exit 1
          fi
          echo "  ✓ Backend healthy"

          # Frontend check
          if [ -n "$FRONTEND_URL" ]; then
            status=$(curl -m 10 -sL -o /dev/null -w "%{http_code}" "${FRONTEND_URL}")
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "  ✓ Frontend live (HTTP $status)"
            else
              echo "ERROR: Frontend returned HTTP $status"
              exit 1
            fi
          else
            echo "ERROR: Frontend URL not available"
            exit 1
          fi

          echo "Smoke tests completed!"
