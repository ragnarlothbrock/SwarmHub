name: LLM Cost Analysis

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'apps/api/requirements.txt'
      - 'apps/web/package-lock.json'
      - 'apps/web/package.json'
      - '.github/dependabot.yml'
      - '.github/workflows/dependabot-*'

permissions:
  contents: read
  pull-requests: write

jobs:
  cost-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: Jwrede/tokentoll@ee3d1bd004690330436da6516318e0a20f9fb86b  # v0.8.3
