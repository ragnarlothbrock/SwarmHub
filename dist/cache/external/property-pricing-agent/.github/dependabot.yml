version: 2

updates:
  # Frontend (npm) — security updates only
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    security-updates-only: true
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore(deps-web)

  # Backend (pip) — security updates only
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    security-updates-only: true
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: chore(deps-api)

  # GitHub Actions — security updates only
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    security-updates-only: true
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci-deps)
