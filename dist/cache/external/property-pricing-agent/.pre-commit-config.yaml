repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: ^apps/api/docs/api/openapi\.json$
      - id: check-illegal-windows-names

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Gitleaks - Secret scanning (API keys, passwords, tokens)
  # Install: scoop install gitleaks (Windows) or brew install gitleaks (macOS)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
        args: [--config, .gitleaks.toml]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # Semgrep - SAST (Static Application Security Testing)
  # NOTE: Runs only on pre-push to avoid slowing down frequent commits.
  # Requires: pip install semgrep (Linux/macOS) or Docker (Windows)
  - repo: local
    hooks:
      - id: semgrep-sast
        name: semgrep SAST (error-only)
        entry: semgrep --config semgrep.yml --error --severity ERROR --quiet
        language: system
        files: \.(py|js|ts|tsx|jsx)$
        pass_filenames: true
        stages: [pre-push]

  # Lint-staged - Run linting on staged frontend files only
  # Requires package.json with lint-staged configuration
  - repo: local
    hooks:
      - id: lint-staged-frontend
        name: lint-staged (frontend)
        entry: npx lint-staged
        language: system
        pass_filenames: false
