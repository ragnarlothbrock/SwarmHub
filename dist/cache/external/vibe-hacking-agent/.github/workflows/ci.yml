name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # NOTE: paths-ignore intentionally NOT used here — see issue #561
  # and docs.github.com → "Troubleshooting required status checks →
  # Handling skipped but required checks".
  #
  # Quote from that page:
  #   "If a workflow is skipped due to path filtering [...] then checks
  #    associated with that workflow will remain in a 'Pending' state.
  #    A pull request that requires those checks to be successful will
  #    be blocked from merging.
  #    If, however, a job within a workflow is skipped due to a
  #    conditional, it will report its status as 'Success'."
  #
  # The workflow therefore always starts.  Per-scope cost gating lives
  # in the `changes` job below (dorny/paths-filter) and the
  # `if: needs.changes.outputs.<scope> == 'true'` guard on every
  # expensive job, so docs-only PRs hit the cheap `changes` step,
  # every expensive job ends in `skipped`, and the required-check
  # ruleset clears.  Each scope still runs only when its lane is
  # actually touched — the original "don't run unnecessary lanes"
  # intent is preserved by the job-level guards, not by the trigger.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Merge-queue ready: when the repo enables a merge queue, the same
  # required checks run on the queued merge commit. No-op until then.
  merge_group:

permissions:
  contents: read

jobs:
  # Compute which areas of the repo were touched. Downstream jobs gate on
  # these so a Go-only or docs-only change doesn't run the entire suite.
  # Any change to ci.yml itself triggers everything (safety net).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python: ${{ steps.app.outputs.python }}
      cli: ${{ steps.app.outputs.cli }}
      web: ${{ steps.app.outputs.web }}
      launcher: ${{ steps.app.outputs.launcher }}
      compose: ${{ steps.app.outputs.compose }}
      docker-images: ${{ steps.docker.outputs.changes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: app
        with:
          filters: |
            python:
              - 'packages/decepticon/**'
              - 'packages/decepticon-core/**'
              - 'packages/decepticon-sdk/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            cli:
              - 'clients/cli/**'
              - 'clients/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            web:
              - 'clients/web/**'
              - 'clients/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            launcher:
              - 'clients/launcher/**'
              - '.github/workflows/ci.yml'
            compose:
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
      # Per-image filter: filter name == image name so the matrix can pull
      # `outputs.changes` directly as the list of images to build.
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: docker
        with:
          filters: |
            langgraph:
              - 'containers/langgraph.Dockerfile'
              - 'packages/decepticon/**'
              - 'packages/decepticon-core/**'
              - 'packages/decepticon-sdk/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            litellm:
              - 'containers/litellm.Dockerfile'
              - 'config/litellm.yaml'
              - '.github/workflows/ci.yml'
            sandbox:
              - 'containers/sandbox.Dockerfile'
              # Skills no longer ship in the sandbox image — they live under
              # packages/decepticon/src/decepticon/skills and are read
              # in-process by the langgraph service (see
              # packages/decepticon/src/decepticon/backends/__init__.py).
              # Skill changes rebuild langgraph (via the packages/decepticon/**
              # filter above), not the sandbox.
              - '.github/workflows/ci.yml'
            cli:
              - 'containers/cli.Dockerfile'
              - 'clients/cli/**'
              - 'clients/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            web:
              - 'containers/web.Dockerfile'
              - 'clients/web/**'
              - 'clients/cli/**'
              - 'clients/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            c2-sliver:
              - 'containers/c2-sliver.Dockerfile'
              - '.github/workflows/ci.yml'

  # ── Compose validation guardrail ─────────────────────────────────
  # Closes #215. Catches docker-compose YAML drift early: if a future
  # PR breaks YAML validity or adds a service to the dev override that
  # does not exist in base, this job fails fast. Cheap enough to run on
  # every PR even though the path filter only triggers it on
  # ``docker-compose*.yml`` edits.
  compose-validate:
    name: Compose YAML validate
    needs: changes
    if: ${{ needs.changes.outputs.compose == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # The compose files reference a project-local ``.env`` for the
      # runtime stack. CI doesn't ship one (and shouldn't — keys live
      # in the user's $DECEPTICON_HOME), so the validator runs against
      # an empty .env so it only catches YAML/structure drift.
      - name: Stub empty .env for config-only validation
        run: touch .env
      - name: Validate base docker-compose.yml
        run: docker compose -f docker-compose.yml config > /dev/null
      - name: Validate base + dev override
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config > /dev/null
      - name: Validate base + dev + watch
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.watch.yml config > /dev/null

  python:
    # ubuntu-only by design: the Python backend ships and runs inside the
    # langgraph Docker image (python:3.13-slim — Linux), never natively on
    # a developer's macOS/Windows host. The pip-installable `decepticon`
    # SDK is a thin client that routes execution to those Linux services
    # over HTTP, so there is no macOS/Windows Python runtime to validate.
    # Testing Python on macOS only bought 10x CI minutes, flakiness, and a
    # docker-not-available failure on the slow benchmark suite. The Go
    # launcher and the TS CLI DO run on the host, so those jobs keep their
    # macOS (+ Windows for launcher) matrices below.
    name: Python (lint + typecheck + test)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.8.15"
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      # Cache the resolved virtualenv across runs. setup-uv's enable-cache
      # only caches the uv binary's HTTP cache, not the materialized .venv,
      # so a cold uv sync still rebuilds the env every time. Keying on
      # uv.lock + pyproject.toml + python version means the cache is only
      # invalidated when dependencies actually change.
      - name: Cache .venv
        id: venv-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: uv sync --dev --locked
      # Lint + typecheck are dispatched through the Makefile so the
      # Makefile remains the single source of truth for what CI runs.
      # See `make ci-lint` and scripts/check_basedpyright_errors.py.
      - name: Lint + typecheck (CI mirror — `make ci-lint`)
        run: make ci-lint
      - name: Upload basedpyright JSON (on failure)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: basedpyright-${{ github.run_id }}
          path: bp.json
          retention-days: 7
      # SKILL.md schema validator — mandatory after Phase 0 completed
      # the 208-violation → 0-violation cleanup. Any new SKILL.md added
      # via PR must conform to the canonical schema (see
      # docs/skill-schema.md) or the lint stage blocks the merge.
      - name: Skill corpus audit (strict mode)
        run: make audit-skills-strict
      # Phase 1a graph builder — assert the checked-in skills.cypher
      # matches what the builder produces from the current SKILL.md +
      # seed YAML + pinned MITRE STIX bundle. Authors who edit a
      # SKILL.md must also commit the regenerated dump.
      - name: Pre-warm MITRE STIX bundle (immutable v19.1 tag)
        run: |
          mkdir -p ~/.cache/skillogy/mitre
          BUNDLE=~/.cache/skillogy/mitre/enterprise-attack-19.1.json
          EXPECTED_SHA256=bdf1ce86a4e604214c5076d37ae4dcb322678afc528df8492e6fdc1b554f5da3
          # Pin to the v19.1 release tag so CI gets the same bytes every
          # run. The 'master' branch reflows as MITRE pushes patches,
          # which silently drifts the cypher dump and breaks
          # `check-skill-graph`.
          if [ ! -f "$BUNDLE" ]; then
            curl -sSL \
              https://raw.githubusercontent.com/mitre-attack/attack-stix-data/v19.1/enterprise-attack/enterprise-attack-19.1.json \
              -o "$BUNDLE"
          fi
          echo "$EXPECTED_SHA256  $BUNDLE" | sha256sum -c -
      - name: Skill graph build gate (Phase 1a)
        run: |
          set +e
          make check-skill-graph
          ec=$?
          if [ $ec -ne 0 ]; then
            echo "::group::Diff against checked-in dump"
            uv run python -m decepticon.skillogy.builder --frozen-built-at --out /tmp/built.cypher
            diff -u packages/decepticon/decepticon/skills/.graph/skills.cypher /tmp/built.cypher | head -200 || true
            echo "::endgroup::"
            exit $ec
          fi
      # PRs run tests without coverage instrumentation — coverage adds ~3x
      # runtime and PR feedback latency matters more than coverage tracking
      # on every change. Coverage is enforced on main pushes (next step).
      - name: Pytest (PRs — fast, no coverage; mirrors `make ci-test`)
        if: github.event_name == 'pull_request'
        # Deselect tests marked `slow` (e.g. benchmark/test_harness wall-clock
        # timeout cases) so PR feedback stays under a minute. Main coverage
        # lane below still runs them.
        run: make ci-test
      - name: Pytest with coverage (main — mirrors `make ci-test-coverage`)
        if: github.event_name == 'push'
        run: make ci-test-coverage
      - name: Upload coverage artifact
        if: github.event_name == 'push' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # ── PR coverage visibility (NON-BLOCKING) ───────────────────────────
  # Informational coverage job that runs in PARALLEL with the blocking
  # `python` job, so it does NOT add to merge latency. The blocking PR
  # lane deliberately runs pytest WITHOUT coverage (see the comment in
  # the `python` job above — coverage adds ~3x runtime and PR feedback
  # latency is the priority). This job exists purely to surface a
  # coverage delta to PR reviewers without contradicting that decision:
  #   * uses `--cov-fail-under=0` (via `make ci-test-coverage-report`),
  #     so a coverage drop NEVER fails the PR;
  #   * is NOT in the repo's required-status set — keep it out of the
  #     branch protection list so it remains advisory only;
  #   * uploads coverage.xml as an artifact and writes a short summary
  #     to $GITHUB_STEP_SUMMARY for at-a-glance review.
  coverage-report:
    name: Coverage report (PRs — informational, non-blocking)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The real non-blocking guarantee is that this job is NOT in the
    # required-status list in branch protection — that is what keeps a
    # red result here from blocking merge. `continue-on-error: true` is
    # a secondary safety net at the workflow level: if a step fails, the
    # workflow run's overall conclusion stays `success` (so the commit
    # status check posted by GitHub Actions never goes red), even though
    # the job's own conclusion in the run UI will still read `failure`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so diff-cover can diff against the merge base.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.8.15"
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      # Share the cached .venv with the blocking `python` job (same key
      # shape) so the cold-cache cost of this job is mostly checkout +
      # pytest, not a full uv resolve.
      - name: Cache .venv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: uv sync --dev --locked
      - name: Pytest with coverage (no threshold — `make ci-test-coverage-report`)
        run: make ci-test-coverage-report
      # Patch coverage: which lines CHANGED by this PR lack test
      # coverage. Far higher signal for reviewers than the global
      # percentage — a PR can keep global coverage flat while shipping
      # entirely untested new code. Still informational (this job is
      # non-blocking by design, see header comment).
      - name: Patch coverage on changed lines (diff-cover)
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            {
              echo ""
              echo "## Patch coverage (changed lines)"
              echo ""
              uv tool run diff-cover coverage.xml \
                --compare-branch "origin/${{ github.base_ref }}" \
                --markdown-report diff-cover.md --quiet \
                && cat diff-cover.md || echo "_diff-cover failed — see logs._"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Write coverage summary to step summary
        if: always()
        run: |
          {
            echo "## Coverage report (informational)"
            echo ""
            echo "This is a NON-BLOCKING coverage visibility job. The blocking PR"
            echo "pytest step runs without coverage by design — see the comment in"
            echo "the \`python\` job. Coverage threshold gating happens on main pushes."
            echo ""
            if [ -f coverage.xml ]; then
              # line-rate is a fraction in [0,1] on the root <coverage> tag
              rate=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('coverage.xml').getroot().attrib.get('line-rate','0'))")
              pct=$(python -c "print(f'{float(\"$rate\")*100:.2f}')")
              echo "**Line coverage:** ${pct}%"
            else
              echo "_coverage.xml not produced — see the pytest step logs._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-xml-pr
          path: coverage.xml
          if-no-files-found: ignore

  cli:
    # Matrix mirrors the python job — Linux + macOS. Windows runner is
    # deferred until the cli test suite is verified on Windows in a
    # follow-up PR (the launcher already runs on Windows below since
    # platform/system.go introduces the OS-specific code in this PR).
    name: CLI (${{ matrix.os }})
    needs: changes
    # Job-level ``if`` removed on purpose. Each step gates on
    # ``needs.changes.outputs.cli``; when the PR doesn't touch CLI code
    # the job emits a one-line noop and reports success. The repo
    # ruleset treats a literal ``skipping`` status as missing-required,
    # so every required-status job must always report success/failure.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - if: needs.changes.outputs.cli != 'true'
        run: 'echo "No CLI-relevant changes — emitting success."'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.cli == 'true'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: needs.changes.outputs.cli == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - if: needs.changes.outputs.cli == 'true'
        run: npm ci
      # ── rollup native-binary workaround for npm/cli#4828 ────────────
      # `npm ci` from a Linux-generated lock file silently skips the
      # platform-specific optional deps that rollup uses for its native
      # parser. vitest (rollup-based) then crashes at startup on
      # macOS/Windows with `Cannot find module @rollup/rollup-<os>-<arch>`.
      # Force-install the matching binary so the lock file stays
      # canonical but the test runner can resolve its native dep.
      - name: Repair rollup native binary on non-Linux runners
        if: needs.changes.outputs.cli == 'true' && runner.os != 'Linux'
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            macOS-ARM64) npm install --no-save @rollup/rollup-darwin-arm64 ;;
            macOS-X64)   npm install --no-save @rollup/rollup-darwin-x64 ;;
            Windows-X64) npm install --no-save @rollup/rollup-win32-x64-msvc ;;
          esac
      # @decepticon/streaming now ships as a built ESM package
      # (package.json main → dist/index.js). cli's tsc + web's next build
      # resolve the workspace by walking that main, so the dist has to
      # exist before either downstream build runs.
      - name: Build shared streaming workspace
        if: needs.changes.outputs.cli == 'true'
        run: npm run build --workspace=@decepticon/streaming
      - if: needs.changes.outputs.cli == 'true'
        run: cd clients/cli && npm run typecheck
      - name: Run CLI tests
        if: needs.changes.outputs.cli == 'true'
        run: cd clients/cli && npm test --if-present

  web:
    name: Web (lint + build)
    needs: changes
    # See the ``cli`` job for the rationale on job-level ``if`` removal +
    # per-step ``if`` gating: the ruleset requires this status, so it must
    # always succeed/fail rather than be skipped.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - if: needs.changes.outputs.web != 'true'
        run: 'echo "No Web-relevant changes — emitting success."'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.web == 'true'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: needs.changes.outputs.web == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - if: needs.changes.outputs.web == 'true'
        run: npm ci
      - name: Build shared streaming workspace
        if: needs.changes.outputs.web == 'true'
        run: npm run build --workspace=@decepticon/streaming
      - name: Generate Prisma client
        if: needs.changes.outputs.web == 'true'
        run: cd clients/web && npx prisma generate
      - name: Lint
        if: needs.changes.outputs.web == 'true'
        run: cd clients/web && npx eslint src/ --max-warnings 0
      - name: Build
        if: needs.changes.outputs.web == 'true'
        run: cd clients/web && npm run build
        env:
          NEXT_PUBLIC_DECEPTICON_EDITION: oss

  # Go launcher: vet + test. Mirrors what release.yml runs before GoReleaser
  # builds the binaries on tag push, so a broken `go test ./...` is caught
  # at PR time instead of blocking the release pipeline.
  launcher:
    # Matrix exercises Linux, macOS, and Windows so the OS-specific code
    # paths in internal/platform (Detect, DockerHint, LinuxDistro parser,
    # WSL2 IsWSL branch) and the home-dir resolution in internal/config
    # / internal/compose (HOME vs USERPROFILE) don't regress on any OS.
    # The config/compose tests set both HOME and USERPROFILE so
    # os.UserHomeDir() resolves correctly on every runner, and TempDir
    # delivers an OS-appropriate base path on Windows where /tmp does
    # not exist.
    name: Launcher (${{ matrix.os }})
    needs: changes
    # See the ``cli`` job for the rationale on job-level ``if`` removal +
    # per-step ``if`` gating.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - if: needs.changes.outputs.launcher != 'true'
        run: 'echo "No Launcher-relevant changes — emitting success."'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.changes.outputs.launcher == 'true'
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        if: needs.changes.outputs.launcher == 'true'
        with:
          # Read the toolchain from go.mod so CI never drifts from the
          # launcher's declared version (go.mod is the single source of
          # truth; a hardcoded version here masked a 1.24/1.25 mismatch).
          go-version-file: clients/launcher/go.mod
          cache-dependency-path: clients/launcher/go.sum
      - name: go vet
        if: needs.changes.outputs.launcher == 'true'
        working-directory: clients/launcher
        run: go vet ./...
      - name: go test
        if: needs.changes.outputs.launcher == 'true'
        working-directory: clients/launcher
        run: go test ./...

  docker-build:
    name: Docker build (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.docker-images != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.changes.outputs.docker-images) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: containers/${{ matrix.image }}.Dockerfile
          push: false
          load: true
          tags: decepticon-${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=${{ github.event_name == 'push' && 'max' || 'min' }}
      # Informational scan. The hotfix scope (1.0.27) keeps this as a
      # SARIF-only artifact while we (a) curate a .trivyignore for the
      # ~20 Go-stdlib / Debian-advisory CRITICAL findings surfaced by
      # this gate and (b) decide whether they need base-image upgrades.
      # Hard-fail enforcement was attempted in this PR but the existing
      # base images (langgraph, cli) ship CRITICAL CVEs that can't be
      # fixed in a hotfix window — moved to a follow-up supply-chain PR.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: decepticon-${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.sarif
          if-no-files-found: ignore

  # Cross-architecture (linux/arm64) smoke build for Raspberry Pi /
  # Apple Silicon targets. Releases already build multi-arch images, but
  # we want PR-time signal so an arm64 break doesn't only surface at
  # release time. Limited to the two images that are smallest under
  # QEMU (cli + langgraph build in ~3-5 min; sandbox/web take 20+ min
  # under QEMU and would dominate PR CI wall time — they're validated
  # via the release pipeline only).
  #
  # No Trivy step here: `load: false` means the foreign-arch image stays
  # in the buildx cache and isn't materialized into the host Docker, so
  # there's nothing for Trivy to scan. The release pipeline scans the
  # arm64 images post-push.
  docker-build-arm64:
    name: Docker arm64 smoke (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.docker-images != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        image: [cli, langgraph]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build linux/arm64 image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: containers/${{ matrix.image }}.Dockerfile
          push: false
          # `load: false` with --platform linux/arm64 keeps the image in
          # the buildx cache without trying to load a foreign-arch image
          # into the host's local Docker (which would error on amd64
          # runners). The build itself still validates the entire
          # Dockerfile path on the target arch.
          load: false
          platforms: linux/arm64
          tags: decepticon-${{ matrix.image }}:ci-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=${{ github.event_name == 'push' && 'max' || 'min' }},scope=arm64

  # Security scans always run regardless of which paths changed —
  # vulnerability databases update independently of repo state.
  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: uv tool install pip-audit
      - name: Export requirements
        run: uv export --locked --format requirements-txt --no-hashes --no-dev > requirements.txt
      # ENFORCED: a known-vulnerable locked dependency fails CI. To accept
      # a finding temporarily (no released fix, or a fix that breaks the
      # resolution), add its id (PYSEC-/GHSA-) on its own line to
      # .pip-audit-ignore with a comment explaining why + a removal
      # condition. Empty/missing file = nothing ignored.
      - name: Run pip-audit (blocking)
        run: |
          ignore_args=()
          if [ -f .pip-audit-ignore ]; then
            while IFS= read -r vid; do
              vid="${vid%%#*}"; vid="$(echo "$vid" | xargs)"
              [ -n "$vid" ] && ignore_args+=(--ignore-vuln "$vid")
            done < .pip-audit-ignore
          fi
          uv tool run pip-audit --requirement requirements.txt "${ignore_args[@]}"

  # Validate every GitHub Actions workflow + composite action. Cheap (~15s)
  # and catches expression/shell/schema errors before they ship — exactly the
  # class of bug that historically blocked PRs here. Bundles shellcheck
  # (pre-installed on the runner) for the embedded ``run:`` scripts.
  actionlint:
    name: actionlint (workflows)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -color

  # ── Single required status check ─────────────────────────────────
  # Branch protection should require ONLY this job. It aggregates every
  # job above, so adding a new job to this workflow automatically makes
  # it merge-blocking — no ruleset edit, no silently-unprotected lanes.
  #
  # Semantics: `skipped` is a PASS (the path-gated lanes legitimately
  # skip when their scope is untouched — see the `changes` job);
  # `failure` and `cancelled` are FAILs. `coverage-report` is excluded
  # by design: it is the informational, non-blocking lane.
  ci-ok:
    name: CI OK (required status)
    if: always()
    needs:
      - changes
      - compose-validate
      - python
      - cli
      - web
      - launcher
      - docker-build
      - docker-build-arm64
      - security
      - actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify no needed job failed or was cancelled
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          bad=$(echo "$RESULTS" | jq -r '[to_entries[] | select(.value.result == "failure" or .value.result == "cancelled")] | length')
          if [ "$bad" != "0" ]; then
            echo "::error::$bad required job(s) failed or were cancelled."
            exit 1
          fi
