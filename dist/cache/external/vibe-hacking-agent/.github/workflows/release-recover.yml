name: Release Recovery

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, e.g. 1.0.20"
        required: true
        type: string
      promote_latest:
        description: "Promote this version to :latest. Use false for pre-releases."
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  finalize:
    name: Verify images & promote release
    runs-on: ubuntu-latest
    environment: pypi-release
    steps:
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Verify all version-tagged images exist on GHCR
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          images=(
            decepticon-litellm
            decepticon-langgraph
            decepticon-sandbox
            decepticon-cli
            decepticon-skillogy
            decepticon-c2-sliver
            decepticon-web
          )
          for img in "${images[@]}"; do
            ref="ghcr.io/purpleailab/${img}:${VERSION}"
            echo "Verifying ${ref}"
            docker buildx imagetools inspect "${ref}" >/dev/null
          done

      - name: Promote :<version> to :latest
        if: inputs.promote_latest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          images=(
            decepticon-litellm
            decepticon-langgraph
            decepticon-sandbox
            decepticon-cli
            decepticon-skillogy
            decepticon-c2-sliver
            decepticon-web
          )
          for img in "${images[@]}"; do
            src="ghcr.io/purpleailab/${img}:${VERSION}"
            dst="ghcr.io/purpleailab/${img}:latest"
            echo "Promoting ${src} -> ${dst}"
            docker buildx imagetools create --tag "${dst}" "${src}"
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          prerelease=false
          if [[ "${VERSION}" == *-* ]]; then
            prerelease=true
          fi
          gh release edit "v${VERSION}" --draft=false --prerelease="${prerelease}"
