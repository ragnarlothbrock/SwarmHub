<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="hx-title-a">
  <title id="hx-title-a">Citadel: the operating layer for Claude Code and OpenAI Codex. Durable memory, intent routing, safety hooks, cost telemetry, parallel fleets.</title>
  <defs>
    <linearGradient id="hx-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="hx-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="55%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="hx-title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#a0c4ff"/>
      <stop offset="100%" stop-color="#8b9eff"/>
    </linearGradient>
    <linearGradient id="hx-keep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="hx-aur1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hx-aur2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b2ff7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hx-core" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#173050"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <linearGradient id="hx-sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="hx-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hx-glow-lg">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="hx-dots" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="0.8" fill="#1e2632" opacity="0.8"/>
    </pattern>

    <style>
      .hx-mono { font-family: 'SF Mono','Cascadia Code','Consolas',monospace; }
      .hx-sans { font-family: 'Segoe UI',system-ui,-apple-system,sans-serif; }

      /* Aurora blobs drift slowly */
      @keyframes hx-drift1 {
        0%,100% { transform: translate(0,0); }
        50%     { transform: translate(46px,-22px); }
      }
      @keyframes hx-drift2 {
        0%,100% { transform: translate(0,0); }
        50%     { transform: translate(-54px,26px); }
      }
      .hx-a1 { animation: hx-drift1 26s ease-in-out infinite; }
      .hx-a2 { animation: hx-drift2 34s ease-in-out infinite; }

      /* Shimmer sweep along the top accent bar */
      @keyframes hx-sweep-x {
        0%       { transform: translateX(-260px); opacity: 0; }
        8%       { opacity: 0.9; }
        34%      { transform: translateX(1300px); opacity: 0.9; }
        38%,100% { transform: translateX(1300px); opacity: 0; }
      }
      .hx-sw { animation: hx-sweep-x 9s cubic-bezier(0.4,0,0.2,1) infinite; }

      /* Orbits: rotation about the local origin of a translated group */
      @keyframes hx-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .hx-o1 { animation: hx-spin 18s linear infinite; }
      .hx-o2 { animation: hx-spin 27s linear infinite; }
      .hx-o3 { animation: hx-spin 38s linear infinite; }
      .hx-o4 { animation: hx-spin 52s linear infinite; }

      /* Core breathing */
      @keyframes hx-breathe { 0%,100% { opacity: 0.30; } 50% { opacity: 0.6; } }
      .hx-cb { animation: hx-breathe 5s ease-in-out infinite; }

      /* Ripple rings emitted by the core */
      @keyframes hx-ripple {
        0%   { r: 30; opacity: 0; }
        6%   { opacity: 0.40; }
        46%  { r: 120; opacity: 0; }
        100% { r: 120; opacity: 0; }
      }
      .hx-rp1 { animation: hx-ripple 7s cubic-bezier(0.2,0.6,0.4,1) infinite; }
      .hx-rp2 { animation: hx-ripple 7s cubic-bezier(0.2,0.6,0.4,1) 3.5s infinite; }

      /* Chips glow in sequence: memory, routing, hooks, telemetry, fleets */
      @keyframes hx-chip {
        0%,100% { opacity: 0.55; }
        6%      { opacity: 1; }
        14%     { opacity: 0.55; }
      }
      .hx-c1 { animation: hx-chip 12s linear 0s    infinite; }
      .hx-c2 { animation: hx-chip 12s linear 2.4s  infinite; }
      .hx-c3 { animation: hx-chip 12s linear 4.8s  infinite; }
      .hx-c4 { animation: hx-chip 12s linear 7.2s  infinite; }
      .hx-c5 { animation: hx-chip 12s linear 9.6s  infinite; }

      /* Terminal caret blink */
      @keyframes hx-caret { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      .hx-ct { animation: hx-caret 1.1s steps(1) infinite; }

      @media (prefers-reduced-motion: reduce) {
        .hx-a1, .hx-a2, .hx-sw, .hx-o1, .hx-o2, .hx-o3, .hx-o4,
        .hx-cb, .hx-rp1, .hx-rp2, .hx-c1, .hx-c2, .hx-c3, .hx-c4, .hx-c5, .hx-ct {
          animation: none;
        }
        .hx-rp1, .hx-rp2 { opacity: 0; }
        .hx-c1, .hx-c2, .hx-c3, .hx-c4, .hx-c5 { opacity: 0.8; }
      }
    </style>
  </defs>

  <!-- ════════════ BACKGROUND ════════════ -->
  <rect width="1200" height="480" rx="16" fill="url(#hx-bg)"/>
  <rect width="1200" height="480" rx="16" fill="url(#hx-dots)" opacity="0.55"/>
  <g class="hx-a1"><ellipse cx="320" cy="120" rx="430" ry="220" fill="url(#hx-aur1)"/></g>
  <g class="hx-a2"><ellipse cx="950" cy="360" rx="420" ry="240" fill="url(#hx-aur2)"/></g>
  <rect x="0.75" y="0.75" width="1198.5" height="478.5" rx="16" fill="none" stroke="#1e2632" stroke-width="1.5"/>

  <!-- Top accent bar + travelling shimmer (clipped to the bar) -->
  <clipPath id="hx-barclip"><rect x="30" y="0" width="1140" height="3" rx="1.5"/></clipPath>
  <rect x="30" y="0" width="1140" height="3" rx="1.5" fill="url(#hx-accent)" opacity="0.9"/>
  <g clip-path="url(#hx-barclip)">
    <rect class="hx-sw" x="30" y="0" width="220" height="3" fill="url(#hx-sweep)"/>
  </g>

  <!-- Corner ticks -->
  <path d="M 26 44 V 26 H 44" fill="none" stroke="#2b3a55" stroke-width="1.5"/>
  <path d="M 1174 436 V 454 H 1156" fill="none" stroke="#2b3a55" stroke-width="1.5"/>

  <!-- ════════════ LEFT: WORDMARK BLOCK ════════════ -->

  <!-- Eyebrow: castle glyph + label -->
  <g transform="translate(70,74) scale(0.082)">
    <path fill="url(#hx-keep)" d="M216 136h16v24h16v-24h16v24h16v-24h16v40h-80z"/>
    <rect x="216" y="176" width="80" height="200" fill="url(#hx-keep)"/>
    <path fill="#38bdf8" d="M128 196h12v18h12v-18h12v18h12v-18h12v32h-60z"/>
    <rect x="128" y="228" width="60" height="148" fill="#38bdf8"/>
    <path fill="#38bdf8" d="M324 196h12v18h12v-18h12v18h12v-18h12v32h-60z"/>
    <rect x="324" y="228" width="60" height="148" fill="#38bdf8"/>
    <rect x="112" y="376" width="288" height="40" fill="#0ea5e9"/>
    <path fill="#0f1b2d" d="M236 312a20 20 0 0 1 40 0v64h-40z"/>
    <rect x="248" y="216" width="16" height="28" rx="8" fill="#0f1b2d"/>
  </g>
  <text x="122" y="103" class="hx-mono" font-size="11" fill="#00d2ff" letter-spacing="3.5" opacity="0.85">OPEN-SOURCE AGENT ORCHESTRATION</text>

  <!-- Wordmark -->
  <text x="66" y="192" class="hx-sans" font-size="86" font-weight="900" fill="#00d2ff" opacity="0.07" filter="url(#hx-glow-lg)" letter-spacing="5">CITADEL</text>
  <text x="66" y="192" class="hx-sans" font-size="86" font-weight="900" fill="url(#hx-title)" letter-spacing="5">CITADEL</text>
  <rect x="70" y="206" width="430" height="2.5" rx="1.25" fill="url(#hx-accent)" opacity="0.85"/>

  <!-- Tagline -->
  <text x="70" y="248" class="hx-sans" font-size="19" fill="#c9d1d9" letter-spacing="0.3">The operating layer for <tspan font-weight="600" fill="#e6edf3">Claude Code</tspan> and <tspan font-weight="600" fill="#e6edf3">OpenAI Codex</tspan>.</text>

  <!-- Capability chips -->
  <g class="hx-c1">
    <rect x="70" y="282" width="124" height="26" rx="13" fill="#0d1a2a" stroke="#58a6ff" stroke-width="1"/>
    <text x="132" y="299" class="hx-mono" font-size="11" fill="#58a6ff" text-anchor="middle" letter-spacing="0.5">durable memory</text>
  </g>
  <g class="hx-c2">
    <rect x="206" y="282" width="103" height="26" rx="13" fill="#0d2020" stroke="#00d2ff" stroke-width="1"/>
    <text x="257" y="299" class="hx-mono" font-size="11" fill="#00d2ff" text-anchor="middle" letter-spacing="0.5">/do routing</text>
  </g>
  <g class="hx-c3">
    <rect x="321" y="282" width="110" height="26" rx="13" fill="#0d1f12" stroke="#3fb950" stroke-width="1"/>
    <text x="376" y="299" class="hx-mono" font-size="11" fill="#3fb950" text-anchor="middle" letter-spacing="0.5">safety hooks</text>
  </g>
  <g class="hx-c4">
    <rect x="443" y="282" width="124" height="26" rx="13" fill="#1a1000" stroke="#f0883e" stroke-width="1"/>
    <text x="505" y="299" class="hx-mono" font-size="11" fill="#f0883e" text-anchor="middle" letter-spacing="0.5">cost telemetry</text>
  </g>
  <g class="hx-c5">
    <rect x="579" y="282" width="130" height="26" rx="13" fill="#140d22" stroke="#bc8cff" stroke-width="1"/>
    <text x="644" y="299" class="hx-mono" font-size="11" fill="#bc8cff" text-anchor="middle" letter-spacing="0.5">parallel fleets</text>
  </g>

  <!-- Orchestration ladder -->
  <text x="70" y="354" class="hx-mono" font-size="12.5" letter-spacing="0.4">
    <tspan fill="#4a5568">scales from</tspan>
    <tspan fill="#00d2ff" dx="6">skill</tspan><tspan fill="#3d4f6b" dx="6">→</tspan>
    <tspan fill="#58a6ff" dx="6">marshal</tspan><tspan fill="#3d4f6b" dx="6">→</tspan>
    <tspan fill="#f0883e" dx="6">archon</tspan><tspan fill="#3d4f6b" dx="6">→</tspan>
    <tspan fill="#bc8cff" dx="6">fleet</tspan>
  </text>

  <!-- Install CTA -->
  <text x="70" y="412" class="hx-mono" font-size="15">
    <tspan fill="#3fb950">$</tspan>
    <tspan fill="#79c0ff" dx="8">/do setup --express</tspan>
  </text>
  <rect class="hx-ct" x="269" y="399" width="8" height="16" fill="#79c0ff" opacity="0.9"/>
  <text x="70" y="434" class="hx-sans" font-size="11" fill="#4a5568">one command from install to operating</text>

  <!-- ════════════ RIGHT: ORBITAL SYSTEM ════════════ -->

  <!-- Orbit rings -->
  <circle cx="940" cy="252" r="62"  fill="none" stroke="#3b4f73" stroke-width="1" opacity="0.75"/>
  <circle cx="940" cy="252" r="100" fill="none" stroke="#3b4f73" stroke-width="1" opacity="0.58"/>
  <circle cx="940" cy="252" r="140" fill="none" stroke="#3b4f73" stroke-width="1" opacity="0.44"/>
  <circle cx="940" cy="252" r="180" fill="none" stroke="#3b4f73" stroke-width="1" opacity="0.32"/>

  <!-- Ripples -->
  <circle class="hx-rp1" cx="940" cy="252" r="30" fill="none" stroke="url(#hx-accent)" stroke-width="1.5" opacity="0"/>
  <circle class="hx-rp2" cx="940" cy="252" r="30" fill="none" stroke="url(#hx-accent)" stroke-width="1.5" opacity="0"/>

  <!-- Orbiting agents: node + comet trail arc, one ring each -->
  <g transform="translate(940,252) rotate(40)">
    <g class="hx-o1">
      <path d="M 0 -62 A 62 62 0 0 0 -53.7 -31" fill="none" stroke="#00d2ff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <circle cx="0" cy="-62" r="6" fill="#00d2ff" filter="url(#hx-glow)"/>
      <circle cx="0" cy="-62" r="2.2" fill="#e6ffff" opacity="0.95"/>
    </g>
  </g>
  <g transform="translate(940,252) rotate(190)">
    <g class="hx-o2">
      <path d="M 0 -100 A 100 100 0 0 0 -86.6 -50" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <circle cx="0" cy="-100" r="7" fill="#58a6ff" filter="url(#hx-glow)"/>
      <circle cx="0" cy="-100" r="2.5" fill="#eef5ff" opacity="0.95"/>
    </g>
  </g>
  <g transform="translate(940,252) rotate(300)">
    <g class="hx-o3">
      <path d="M 0 -140 A 140 140 0 0 0 -121.2 -70" fill="none" stroke="#f0883e" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <circle cx="0" cy="-140" r="6.5" fill="#f0883e" filter="url(#hx-glow)"/>
      <circle cx="0" cy="-140" r="2.3" fill="#fff2e6" opacity="0.95"/>
    </g>
  </g>
  <g transform="translate(940,252) rotate(120)">
    <g class="hx-o4">
      <path d="M 0 -180 A 180 180 0 0 0 -155.9 -90" fill="none" stroke="#bc8cff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
      <circle cx="0" cy="-180" r="7.5" fill="#bc8cff" filter="url(#hx-glow)"/>
      <circle cx="0" cy="-180" r="2.6" fill="#f6eeff" opacity="0.95"/>
    </g>
  </g>

  <!-- Core: the harness -->
  <circle class="hx-cb" cx="940" cy="252" r="34" fill="url(#hx-accent)" filter="url(#hx-glow-lg)" opacity="0.30"/>
  <circle cx="940" cy="252" r="27" fill="url(#hx-core)" stroke="url(#hx-accent)" stroke-width="1.5"/>
  <g transform="translate(919.5,232) scale(0.082)">
    <path fill="url(#hx-keep)" d="M216 136h16v24h16v-24h16v24h16v-24h16v40h-80z"/>
    <rect x="216" y="176" width="80" height="200" fill="url(#hx-keep)"/>
    <path fill="#38bdf8" d="M128 196h12v18h12v-18h12v18h12v-18h12v32h-60z"/>
    <rect x="128" y="228" width="60" height="148" fill="#38bdf8"/>
    <path fill="#38bdf8" d="M324 196h12v18h12v-18h12v18h12v-18h12v32h-60z"/>
    <rect x="324" y="228" width="60" height="148" fill="#38bdf8"/>
    <rect x="112" y="376" width="288" height="40" fill="#0ea5e9"/>
    <path fill="#0f1b2d" d="M236 312a20 20 0 0 1 40 0v64h-40z"/>
    <rect x="248" y="216" width="16" height="28" rx="8" fill="#0f1b2d"/>
  </g>

  <!-- ════════════ FOOTER ════════════ -->
  <line x1="30" y1="450" x2="1170" y2="450" stroke="#1c2330" stroke-width="1"/>
  <text x="600" y="468" class="hx-sans" font-size="11" fill="#54678a" text-anchor="middle" letter-spacing="0.5">Simple tasks get simple tools. Complex tasks get campaigns. You never have to choose.</text>
</svg>
